<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Committee | IIT KGP Induction</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="theme-toggle" class="theme-toggle fixed" aria-label="Toggle dark mode">🌙</button>


    <!-- Committee Hero -->

    <section class="committee-hero">
        <div class="committee-overlay">
            <h1 id="committeeTitle"></h1>
            <p id="committeeDescription"></p>
        </div>
    </section>

    <!-- Societies -->

    <section class="committee-societies">
        <div class="section-heading">
            <h2>Societies</h2>
            <p>
                Explore all societies under this committee.
            </p>
        </div>

        <div id="societyContainer" class="society-container">
            <!-- Generated by committee.js -->
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>
            © 2026 IIT Kharagpur Induction Programme
        </p>
    </footer>
    
    <script src="js/societies.js"></script>
    <script src="js/committee.js"></script>
    <script src="js/darkmode.js"></script>

</body>

</html>
